name: APlan Multi-Hour Auto Scan Tool

on:
  schedule:
    # 💡 調整後：台灣時間 08:05, 09:05, 10:05, 11:05, 12:05, 13:05, 14:05
    # 國際標準時間 (UTC) 對應為 0,1,2,3,4,5,6 點的 05 分。每週一至週五執行。
    
    - cron: '5 0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: #  workflow_dispatch: # 允許您隨時在 GitHub 後台手動點擊按鈕強制執行

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: 🔁 複製 GitHub 專案代碼
      uses: actions/checkout@v3

    - name: 🐍 配置 Python 執行環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install streamlit yfinance pandas requests plotly lxml

    - name: 🚀 執行全市場 10 Workers 無介面自動掃描與累積天數
      run: |
        python main.py --automation

    - name: 💾 將新累積的歷史 CSV 紀錄安全存回您的 GitHub Repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add ScanCache_APlan_*.csv ScanHistory_Tracker.csv || true
        # 這裡會自動覆蓋同天檔案並更新當下狀態，不會重疊累積天數
        git commit -m "🤖 盤中即時更新：自動化同步 [$(date +'%Y-%m-%d %H:%M:%S')]" || true
        git push || true