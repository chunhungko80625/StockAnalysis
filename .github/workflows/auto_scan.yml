name: APlan Multi-Hour Auto Scan Tool

on:
  schedule:
    # 💡 今晚測試用：台灣時間 23:35 (UTC 15:35)
    - cron: '35 15 * * *'
    # 💡 今晚測試用：台灣時間 23:45 (UTC 15:45)
    - cron: '45 15 * * *'
  workflow_dispatch: # 允許手動執行

# 💡 關鍵修正：必須賦予寫入權限，否則下方的 git push 會被 GitHub 拒絕
permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: 🔁 複製 GitHub 專案代碼
      uses: actions/checkout@v3

    - name: 🐍 配置 Python 執行環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 安裝相依套件
      run: |
        python -m pip install --upgrade pip
        pip install streamlit yfinance pandas requests plotly lxml

    - name: 🚀 執行全市場掃描
      run: |
        python main.py --automation

    - name: 💾 將新累積的歷史 CSV 紀錄安全存回您的 GitHub Repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add ScanCache_APlan_*.csv ScanHistory_Tracker.csv || true
        git commit -m "🤖 盤中即時更新：自動化同步 [$(date +'%Y-%m-%d %H:%M:%S')]" || true
        git push || true
